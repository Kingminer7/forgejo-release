name: Upload (and download) a release to (and from) the project that runs the workflow
on: [push]
jobs:
  upload-download:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        id: release-upload
        uses: SELF@vTest
        with:
          direction: upload
          tag: v1.0
          token: FORGEJO_TOKEN
          release-dir: upload-dir
          release-notes: "RELEASE NOTES"
          verbose: true
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        id: release-upload
        uses: SELF@vTest
        with:
          direction: upload
          tag: v1.0
          token: FORGEJO_TOKEN
          release-dir: upload-dir
          release-notes: "RELEASE NOTES"
          override: "true"
          verbose: true
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        id: release-download
        uses: SELF@vTest
        with:
          direction: download
          tag: v1.0
          token: FORGEJO_TOKEN
          release-dir: download-dir
          verbose: true
      - if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          diff -u upload-dir download-dir
